version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: cash-register-db
    environment:
      POSTGRES_DB: cashregister
      # NOTE: Change these credentials before any production deployment.
      # Use Docker secrets or a .env file (not committed to source control).
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cash-register-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/cashregister
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
