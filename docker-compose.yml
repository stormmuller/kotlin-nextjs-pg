services:
  api:
    build:
      context: ./yoco-cash-register-api
    ports:
      - "8080:8080"
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/cashregister
      POSTGRES_USER: ${POSTGRES_USER:-cashregister}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cashregister}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cashregister
      POSTGRES_USER: ${POSTGRES_USER:-cashregister}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cashregister}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cashregister} -d cashregister"]
      interval: 10s
      timeout: 5s
      retries: 5
